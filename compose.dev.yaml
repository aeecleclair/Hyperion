services:
  hyperion-db:
    image: postgres:15.1-alpine3.17
    container_name: hyperion-db-dev
    restart: unless-stopped
    # Headroom for the test suite: each xdist worker drops ~60 tables in a
    # single transaction, which blows past the default 64-locks-per-tx limit.
    command:
      - postgres
      - -c
      - max_locks_per_transaction=512
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGTZ: ${POSTGRES_TZ}
    ports:
      - 5432:5432
    volumes:
      - ./hyperion-db:/var/lib/postgresql/data

  hyperion-redis:
    image: redis:7.0-alpine3.17
    container_name: hyperion-redis-dev
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - ./hyperion-redis:/data
