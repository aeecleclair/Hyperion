name: Test
# https://docs.github.com/actions/automating-builds-and-tests/building-and-testing-nodejs-or-python?langId=py#requirements-file

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Add a Redis container
    # https://docs.github.com/en/actions/using-containerized-services/creating-redis-service-containers#running-jobs-directly-on-the-runner-machine
    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      redis:
        # Docker Hub image
        image: redis:7.0-alpine3.17
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379
      # Postgres is started manually in a step below (rather than via this
      # `services:` block) because GitHub Actions does not expose docker's
      # CMD/args field, and we need to pass `-c max_locks_per_transaction=512`
      # to keep xdist's concurrent `drop_db` from exhausting Postgres's lock
      # table.

    steps:
      - name: Start Postgres with tuned lock limits
        run: |
          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=somerealpassword \
            -e POSTGRES_USER=hyperion \
            -e POSTGRES_DB=hyperion \
            -p 5432:5432 \
            --health-cmd=pg_isready \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            postgres:15.1-alpine3.17 \
            postgres -c max_locks_per_transaction=512
          # Wait for healthy
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U hyperion >/dev/null 2>&1; then
              echo "Postgres is ready"; exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"; docker logs postgres; exit 1

      - name: Check out the code
        uses: actions/checkout@v6

      - name: Fetch full main branch history # We don't known the the base commit of the PR
        run: git fetch origin main --unshallow

      # Setup Python (faster than using Python container)
      - name: Setup Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version-file: .python-version

      - name: Cache uv folder
        id: cache-uv
        uses: actions/cache@v4.3.0
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-uv-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.9.27/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Cache .pytest_cache folder
        id: pytest_cache
        uses: actions/cache@v4.3.0
        with:
          path: .pytest_cache
          key: pytest_cache-${{ github.head_ref }}

      # Run unit tests, run them all when push to main branch
      - name: Run all unit tests
        run: python tests_script.py --cov --all
        if: github.event_name == 'push'

      - name: Run unit tests for changed files
        run: python tests_script.py --cov
        if: github.event_name == 'pull_request'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
